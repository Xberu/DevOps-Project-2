apiVersion: v1
kind: Pod
metadata:
  name: catalog-pod
  labels:
    app: s1-catalog

spec:
  containers:
    - name: catalog-container
      image: "public.ecr.aws/aws-containers/retail-store-sample-catalog:1.3.0"
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
      resources:
        limits:
          memory: "256Mi"
          cpu: "200m"
        requests:
          memory: "100Mi"
          cpu: "128m"
      readinessProbe:
        httpGet:
          path: /health
          #path: /topology
          port: 8080